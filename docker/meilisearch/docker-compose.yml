version: "3.8"

services:
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: "580c188a8b410e5a64cb5f3f7c3ed6f979b9012f95596cb3933edb27b9b162db"
      MEILI_ENV: "production"
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped

volumes:
  meilisearch_data:
